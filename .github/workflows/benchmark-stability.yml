name: Benchmark Stability

on:
  push:
    branches-ignore:
      - main

jobs:
  stability:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Rounds sweep (warmup 2)
          - { iterations: 10000, rounds: 6,  warmup: 2, label: 10k-r6-w2 }
          - { iterations: 10000, rounds: 7,  warmup: 2, label: 10k-r7-w2 }
          - { iterations: 10000, rounds: 8,  warmup: 2, label: 10k-r8-w2 }
          - { iterations: 10000, rounds: 9,  warmup: 2, label: 10k-r9-w2 }
          # Warmup sweep (7 rounds)
          - { iterations: 10000, rounds: 7,  warmup: 1, label: 10k-r7-w1 }
          - { iterations: 10000, rounds: 7,  warmup: 3, label: 10k-r7-w3 }
          # Combo tweaks
          - { iterations: 10000, rounds: 8,  warmup: 1, label: 10k-r8-w1 }
          - { iterations: 10000, rounds: 8,  warmup: 3, label: 10k-r8-w3 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2
          coverage: none
          extensions: mbstring, dom, curl, json, libxml, xml, xmlwriter, simplexml, tokenizer

      - name: Determine composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache composer
        uses: actions/cache@v3
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Run benchmarks (5 repeats)
        run: |
          for i in 1 2 3 4 5; do
            echo "--- Repeat $i ---"
            vendor/bin/testbench benchmark \
              --ci \
              --iterations=${{ matrix.iterations }} \
              --rounds=${{ matrix.rounds }} \
              --warmup=${{ matrix.warmup }} \
              --dump=stats-rep${i}.json
            echo ""
          done

      - name: Upload stats
        uses: actions/upload-artifact@v4
        with:
          name: stats-${{ matrix.label }}
          path: stats-rep*.json

  aggregate:
    needs: stability
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Download all stats
        uses: actions/download-artifact@v4
        with:
          path: stats
          pattern: stats-*

      - name: Generate stability report
        run: php .github/scripts/aggregate-stability.php stats > stability-report.md

      - name: Show report
        run: cat stability-report.md >> $GITHUB_STEP_SUMMARY

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: stability-report
          path: stability-report.md
