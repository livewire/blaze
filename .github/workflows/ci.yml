name: CI

on:
  pull_request:
    types: [ready_for_review, synchronize, opened]
    paths-ignore:
      - "README.md"
  push:
    branches: [main]
    paths-ignore:
      - "README.md"

jobs:
  pest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: [ '8.2', '8.3', '8.4' ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
          coverage: none
          extensions: mbstring, dom, curl, json, libxml, xml, xmlwriter, simplexml, tokenizer, pdo, sqlite3
          ini-values: error_reporting=E_ALL, display_errors=On, log_errors=Off

      - name: Determine composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache composer
        uses: actions/cache@v3
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Validate composer.json
        run: composer validate --no-check-publish

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Run Pest
        run: vendor/bin/pest --no-coverage
        env:
          CI: true

  benchmark:
    needs: pest
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        repeat: ["01", "02", "03", "04", "05", "06", "07", "08", "09", "10"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2
          coverage: none
          extensions: mbstring, dom, curl, json, libxml, xml, xmlwriter, simplexml, tokenizer

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Run benchmark (run ${{ matrix.repeat }}/10)
        run: vendor/bin/testbench benchmark:variance props --ci --runs=10 --iterations=5000 --rounds=50 --attempts=10 > benchmark-result.md

      - name: Upload benchmark result
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-result-${{ matrix.repeat }}
          path: benchmark-result.md

  benchmark-comment:
    needs: benchmark
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      pull-requests: write

    steps:
      - name: Download all benchmark results
        uses: actions/download-artifact@v4
        with:
          pattern: benchmark-result-*

      - name: Assemble comment
        run: |
          echo "## Benchmark Variance Results" > comment.md
          echo "" >> comment.md
          echo "100 rounds x 5000 iterations, repeated 10 times." >> comment.md
          echo "" >> comment.md

          for repeat in $(seq -w 1 10); do
            dir="benchmark-result-${repeat}"

            echo "### Run ${repeat}/10" >> comment.md
            echo "" >> comment.md
            # Strip the "## Benchmark Results" heading line from each result
            sed '/^## Benchmark Results$/d' "$dir/benchmark-result.md" >> comment.md
            echo "" >> comment.md
          done

      - name: Post comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body-path: comment.md
