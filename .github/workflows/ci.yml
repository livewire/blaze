name: CI

on:
  pull_request:
    types: [ready_for_review, synchronize, opened]
    paths-ignore:
      - "README.md"
  push:
    branches: [main]
    paths-ignore:
      - "README.md"

jobs:
  pest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: [ '8.2', '8.3', '8.4' ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
          coverage: none
          extensions: mbstring, dom, curl, json, libxml, xml, xmlwriter, simplexml, tokenizer, pdo, sqlite3
          ini-values: error_reporting=E_ALL, display_errors=On, log_errors=Off

      - name: Determine composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache composer
        uses: actions/cache@v3
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Validate composer.json
        run: composer validate --no-check-publish

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Run Pest
        run: vendor/bin/pest --no-coverage
        env:
          CI: true

  benchmark:
    needs: pest
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        config: ["50-10000", "200-2500", "1000-500"]
        repeat: [1, 2, 3]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2
          coverage: none
          extensions: mbstring, dom, curl, json, libxml, xml, xmlwriter, simplexml, tokenizer

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Run benchmark (${{ matrix.config }}, run ${{ matrix.repeat }}/3)
        run: |
          config="${{ matrix.config }}"
          rounds="${config%%-*}"
          iterations="${config##*-}"

          vendor/bin/testbench benchmark:variance --ci --runs=25 --iterations="$iterations" --rounds="$rounds" > benchmark-result.md

      - name: Upload benchmark result
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-result-${{ matrix.config }}-${{ matrix.repeat }}
          path: benchmark-result.md

  benchmark-comment:
    needs: benchmark
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      pull-requests: write

    steps:
      - name: Download all benchmark results
        uses: actions/download-artifact@v4
        with:
          pattern: benchmark-result-*

      - name: Assemble comment
        run: |
          echo "## Benchmark Variance Results" > comment.md
          echo "" >> comment.md
          echo "Each configuration is executed 3 times." >> comment.md
          echo "" >> comment.md

          for config in "50-10000" "200-2500" "1000-500"; do
            rounds="${config%%-*}"
            iterations="${config##*-}"

            echo "### ${rounds} rounds x ${iterations} iterations" >> comment.md
            echo "" >> comment.md

            for repeat in 1 2 3; do
              dir="benchmark-result-${config}-${repeat}"

              echo "#### Run ${repeat}/3" >> comment.md
              echo "" >> comment.md
              # Strip the "## Benchmark Results" heading line from each result
              sed '/^## Benchmark Results$/d' "$dir/benchmark-result.md" >> comment.md
              echo "" >> comment.md
            done
          done

      - name: Find existing comment
        uses: peter-evans/find-comment@v3
        id: find
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '## Benchmark Variance Results'

      - name: Post or update comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.find.outputs.comment-id }}
          edit-mode: replace
          body-path: comment.md
