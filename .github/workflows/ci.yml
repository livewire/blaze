name: CI

on:
  pull_request:
    types: [ready_for_review, synchronize, opened]
    paths-ignore:
      - "README.md"
  push:
    branches: [main]
    paths-ignore:
      - "README.md"

jobs:
  pest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: [ '8.2', '8.3', '8.4' ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
          coverage: none
          extensions: mbstring, dom, curl, json, libxml, xml, xmlwriter, simplexml, tokenizer, pdo, sqlite3
          ini-values: error_reporting=E_ALL, display_errors=On, log_errors=Off

      - name: Determine composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache composer
        uses: actions/cache@v3
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Validate composer.json
        run: composer validate --no-check-publish

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Run Pest
        run: vendor/bin/pest --no-coverage
        env:
          CI: true

  benchmark:
    needs: pest
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2
          coverage: none
          extensions: mbstring, dom, curl, json, libxml, xml, xmlwriter, simplexml, tokenizer

      - name: Install base dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Generate baseline snapshot
        run: vendor/bin/testbench benchmark --snapshot --ci --iterations=5000 --rounds=15 --warmup=2

      - name: Save baseline snapshot
        run: cp benchmark-snapshot.json ${{ runner.temp }}/benchmark-snapshot.json

      - name: Checkout PR
        uses: actions/checkout@v4

      - name: Install PR dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Restore baseline snapshot
        run: cp ${{ runner.temp }}/benchmark-snapshot.json benchmark-snapshot.json

      - name: Save PR number
        run: echo "${{ github.event.pull_request.number }}" > benchmark-result.md

      - name: Run benchmark
        run: vendor/bin/testbench benchmark --ci --iterations=5000 --rounds=15 --warmup=2 >> benchmark-result.md

      - name: Upload benchmark result
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-result
          path: benchmark-result.md
